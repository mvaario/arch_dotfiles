# -----------------------------------------------------
# Keyboard Layout
# https://wiki.hyprland.org/Configuring/Variables/#input
# -----------------------------------------------------

input {
    kb_layout = fi, us
    kb_variant = 
    kb_model =
    kb_options =
    numlock_by_default = true
    follow_mouse = 1
    mouse_refocus=false
    
    # mouse sensitivity and acceleration
    sensitivity = 0.00000
    accel_profile = flat
    scroll_factor=1

    # touchpad settings
    touchpad {
        disable_while_typing=1
        natural_scroll=1
        scroll_factor=0.2
    }
}

cursor {
    no_warps = 1            # Disable changing cursor positions
    default_monitor = DP-1
    no_hardware_cursors = true
}
